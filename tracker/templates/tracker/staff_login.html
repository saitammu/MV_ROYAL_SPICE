<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Staff Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif}
.box{background:#fff;border-radius:14px;padding:40px 36px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
h1{text-align:center;color:#27ae60;font-size:1.5rem;margin-bottom:4px}
p{text-align:center;color:#888;font-size:.85rem;margin-bottom:26px}
label{display:block;font-size:.82rem;color:#555;margin-bottom:5px;font-weight:600}
input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:7px;margin-bottom:16px;font-size:.9rem;outline:none}
input:focus{border-color:#27ae60}
button{width:100%;padding:11px;background:#27ae60;color:#fff;border:none;border-radius:7px;font-size:.95rem;font-weight:700;cursor:pointer}
.err{background:#fdecea;color:#c0392b;padding:8px 12px;border-radius:6px;font-size:.83rem;margin-bottom:14px;text-align:center}
.back{display:block;text-align:center;margin-top:14px;color:#888;font-size:.82rem;text-decoration:none}
</style>
</head>
<body>
<div class="box">
  <h1>👥 Staff Section</h1>
  <p>Enter staff password to continue</p>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="post">{% csrf_token %}
    <label>Password</label>
    <input type="password" name="password" autofocus required>
    <button type="submit">Enter</button>
  </form>
  <a class="back" href="{% url 'dashboard' %}">← Back to Dashboard</a>
</div>
</body>
</html>
